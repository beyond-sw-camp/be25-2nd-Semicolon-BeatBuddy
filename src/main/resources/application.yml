spring:
  profiles:
    active: dev

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver

  mybatis:
    mapper-locations: classpath:mapper/**/*.xml
    type-aliases-package: com.beyond.beatbuddy
    configuration:
      map-underscore-to-camel-case: true

spotify:
  client-id: ${SPOTIFY_CLIENT_ID}
  client-secret: ${SPOTIFY_CLIENT_SECRET}
  token-url: https://accounts.spotify.com/api/token
  api-base-url: https://api.spotify.com/v1

jwt:
  secret: ${JWT_SECRET:beatbuddy-default-secret-key-must-be-at-least-32-chars}
  access-expiration-ms: 1800000      # 30분
  refresh-expiration-ms: 1209600000  # 14일
